name: shoditsa-dev
services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_DB: shoditsa
      POSTGRES_USER: shoditsa_app
      POSTGRES_PASSWORD: shoditsa_dev
      TZ: UTC
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - shoditsa_dev_postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoditsa_app -d shoditsa"]
      interval: 5s
      timeout: 5s
      retries: 20
  mailpit:
    image: axllent/mailpit:v1.30.3
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_DATABASE: /data/mailpit.db
    volumes:
      - shoditsa_dev_mailpit:/data
volumes:
  shoditsa_dev_postgres:
  shoditsa_dev_mailpit:
