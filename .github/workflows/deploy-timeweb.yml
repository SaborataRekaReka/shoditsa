name: Deploy To Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: shoditsa-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_HOST: 72.56.240.222
  DEPLOY_USER: root
  DEPLOY_PORT: 22
  DEPLOY_TARGET_DIR: /opt/repeto/deploy/shoditsa

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24.14.1", cache: npm }
      - run: npm ci
      - name: Validate and build web release
        run: npm run typecheck && npm test && npm run build
      - name: Package web release
        run: tar -czf release-web.tar.gz -C dist .
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_KEY"
          install -m 700 -d ~/.ssh
          KEY_CONTENT="${SSH_KEY//$'\r'/}"
          KEY_CONTENT="${KEY_CONTENT//\\n/$'\n'}"
          printf '%s\n' "$KEY_CONTENT" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload and activate web release
        run: |
          set -euo pipefail
          REMOTE="$DEPLOY_USER@$DEPLOY_HOST"
          REMOTE_ARCHIVE="/tmp/shoditsa-web-${GITHUB_SHA}.tar.gz"
          ssh -p "$DEPLOY_PORT" "$REMOTE" "mkdir -p '$DEPLOY_TARGET_DIR'"
          scp -P "$DEPLOY_PORT" release-web.tar.gz "$REMOTE:$REMOTE_ARCHIVE"
          ssh -p "$DEPLOY_PORT" "$REMOTE" "DEPLOY_TARGET_DIR='$DEPLOY_TARGET_DIR' GITHUB_SHA='$GITHUB_SHA' REMOTE_ARCHIVE='$REMOTE_ARCHIVE' bash -s" <<'REMOTE'
          set -euo pipefail
          STAGE="${DEPLOY_TARGET_DIR}.stage-${GITHUB_SHA}"
          rm -rf "$STAGE"
          mkdir -p "$STAGE" "$DEPLOY_TARGET_DIR"
          tar -xzf "$REMOTE_ARCHIVE" -C "$STAGE"

          # Activate each file with rename(2), keeping multi-megabyte JSON valid throughout deploy.
          # The HTML entrypoint is moved only after all of its assets and data are ready.
          while IFS= read -r -d '' SOURCE; do
            RELATIVE="${SOURCE#"$STAGE"/}"
            DESTINATION="$DEPLOY_TARGET_DIR/$RELATIVE"
            mkdir -p "$(dirname "$DESTINATION")"
            mv -f "$SOURCE" "$DESTINATION"
          done < <(find "$STAGE" -type f ! -name index.html ! -name build-manifest.json -print0)

          for ENTRY in index.html build-manifest.json; do
            if [ -f "$STAGE/$ENTRY" ]; then
              mv -f "$STAGE/$ENTRY" "$DEPLOY_TARGET_DIR/$ENTRY"
            fi
          done

          chmod -R a+rX "$DEPLOY_TARGET_DIR"
          rm -rf "$STAGE" "$REMOTE_ARCHIVE"
          REMOTE
      - name: External smoke
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PRODUCTION_URL: https://shoditsa.ru
        run: |
          npm run smoke:production
          curl -fsS https://shoditsa.ru/api/v1/meta >/dev/null
