name: Deploy production atomically
on:
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: shoditsa-production
  cancel-in-progress: false
permissions:
  contents: read
  packages: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24.14.1", cache: npm }
      - run: npm ci
      - run: npm run typecheck && npm test && npm run build && npm run build:api && npm run content:import -- --dry-run
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: ghcr.io/saboratarekareka/shoditsa-api:${{ github.sha }}
      - name: Package immutable web release
        run: |
          mkdir -p release/web
          cp -a dist/. release/web/
          cp compose.production.yml release/
          cp -a infra release/
          tar -czf release.tar.gz -C release .
          sha256sum release.tar.gz > release.tar.gz.sha256
      - name: Upload and activate
        env:
          SSH_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.TIMEWEB_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.TIMEWEB_DEPLOY_USER }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /opt/shoditsa/releases/${GITHUB_SHA}.tmp"
          scp release.tar.gz release.tar.gz.sha256 "$DEPLOY_USER@$DEPLOY_HOST:/opt/shoditsa/releases/${GITHUB_SHA}.tmp/"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "RELEASE_SHA=$GITHUB_SHA /opt/shoditsa/app/scripts/deploy/atomic-timeweb.sh"
      - name: External smoke
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PRODUCTION_URL: https://shoditsa.ru
        run: |
          npm run smoke:production
          curl -fsS https://shoditsa.ru/api/v1/meta >/dev/null
