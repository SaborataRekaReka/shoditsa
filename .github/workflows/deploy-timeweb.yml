name: Deploy To Timeweb

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb-main
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_HOST: 72.56.240.222
  DEPLOY_USER: root
  DEPLOY_PORT: 22
  DEPLOY_TARGET_DIR: /opt/repeto/deploy/shoditsa

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Show dist summary
        run: |
          set -euo pipefail
          ls -la dist | head -n 40
          if [ -d dist/data ]; then
            ls -la dist/data | head -n 40
          else
            echo "::warning::dist/data is missing in this build; existing server data will be preserved"
          fi

      - name: Validate SSH secret exists
        run: |
          if [ -z "${{ secrets.TIMEWEB_SSH_KEY }}" ]; then
            echo "::error::TIMEWEB_SSH_KEY is missing or empty"
            exit 1
          fi

      - name: Configure SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          KEY_CONTENT="${{ secrets.TIMEWEB_SSH_KEY }}"
          # Support both real multiline secrets and one-line secrets with escaped \n.
          KEY_CONTENT="${KEY_CONTENT//$'\r'/}"
          KEY_CONTENT="${KEY_CONTENT//\\n/$'\n'}"
          printf '%s\n' "$KEY_CONTENT" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "::error::TIMEWEB_SSH_KEY is not a valid private key. Save the full private key including BEGIN/END lines."
            exit 1
          fi
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Validate SSH authentication
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=10 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "echo ssh-auth-ok"

      - name: Ensure target directory exists
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $DEPLOY_TARGET_DIR"

      - name: Upload dist to server
        run: |
          set -euo pipefail
          scp -P "$DEPLOY_PORT" -r dist/* "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_TARGET_DIR"

      - name: Set permissions and list deployed files
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod -R a+rX $DEPLOY_TARGET_DIR; ls -la $DEPLOY_TARGET_DIR | head -n 20"
