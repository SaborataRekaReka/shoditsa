name: Deploy To Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: shoditsa-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_HOST: 72.56.240.222
  DEPLOY_USER: root
  DEPLOY_PORT: 22
  DEPLOY_ROOT: /opt/shoditsa

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24.14.1", cache: npm }
      - run: npm ci
      - name: Validate and build web release
        run: npm run typecheck && npm test && npm run build
      - name: Build API image
        run: |
          set -euo pipefail
          docker build --build-arg GIT_SHA="$GITHUB_SHA" -f infra/docker/Dockerfile.api -t "shoditsa-api:${GITHUB_SHA}" .
          docker run --rm "shoditsa-api:${GITHUB_SHA}" test -f /app/apps/api/dist/server.js
          docker run --rm "shoditsa-api:${GITHUB_SHA}" test -f /app/apps/api/dist/content-bootstrap-danetki.js
          docker run --rm "shoditsa-api:${GITHUB_SHA}" test -f /app/apps/api/dist/content-import-dtf-comments.js
          docker run --rm "shoditsa-api:${GITHUB_SHA}" test -f /app/apps/api/dist/content-migrate-media.js
          docker save "shoditsa-api:${GITHUB_SHA}" | gzip -1 > release-api-image.tar.gz
          test -s release-api-image.tar.gz
      - name: Package web release
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/build-manifest.json
          ! grep -Fq '<script src="/sdk.js"></script>' dist/index.html
          tar -czf release-web.tar.gz -C dist .
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_KEY"
          install -m 700 -d ~/.ssh
          KEY_CONTENT="${SSH_KEY//$'\r'/}"
          KEY_CONTENT="${KEY_CONTENT//\\n/$'\n'}"
          printf '%s\n' "$KEY_CONTENT" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload and activate web release
        run: |
          set -euo pipefail
          REMOTE="$DEPLOY_USER@$DEPLOY_HOST"
          REMOTE_UPLOAD_DIR="${DEPLOY_ROOT}/incoming"
          REMOTE_ARCHIVE="${REMOTE_UPLOAD_DIR}/shoditsa-web-${GITHUB_SHA}.tar.gz"
          REMOTE_API_IMAGE="${REMOTE_UPLOAD_DIR}/shoditsa-api-${GITHUB_SHA}.tar.gz"
          ssh -p "$DEPLOY_PORT" "$REMOTE" "DEPLOY_ROOT='$DEPLOY_ROOT' REMOTE_UPLOAD_DIR='$REMOTE_UPLOAD_DIR' REMOTE_ARCHIVE='$REMOTE_ARCHIVE' REMOTE_API_IMAGE='$REMOTE_API_IMAGE' bash -s" <<'REMOTE_PREPARE'
          set -euo pipefail
          install -d -m 700 "$REMOTE_UPLOAD_DIR"
          mkdir -p "$DEPLOY_ROOT/releases"
          find "$REMOTE_UPLOAD_DIR" -maxdepth 1 -type f \( -name 'shoditsa-web-*.tar.gz' -o -name 'shoditsa-api-*.tar.gz' \) -mtime +1 -delete
          rm -f "$REMOTE_ARCHIVE" "$REMOTE_API_IMAGE"
          AVAILABLE_KB="$(df -Pk "$DEPLOY_ROOT" | awk 'NR == 2 { print $4 }')"
          if [ "$AVAILABLE_KB" -lt 1048576 ]; then
            echo "At least 1 GiB of free space is required before uploading a release; ${AVAILABLE_KB} KiB available" >&2
            exit 1
          fi
          REMOTE_PREPARE
          scp -P "$DEPLOY_PORT" release-web.tar.gz "$REMOTE:$REMOTE_ARCHIVE"
          scp -P "$DEPLOY_PORT" release-api-image.tar.gz "$REMOTE:$REMOTE_API_IMAGE"
          ssh -p "$DEPLOY_PORT" "$REMOTE" "DEPLOY_ROOT='$DEPLOY_ROOT' GITHUB_SHA='$GITHUB_SHA' REMOTE_ARCHIVE='$REMOTE_ARCHIVE' REMOTE_API_IMAGE='$REMOTE_API_IMAGE' bash -s" <<'REMOTE'
          set -euo pipefail
          API_DEPLOY_ROLLBACK_ARMED=0
          cleanup_uploads() {
            rm -f "$REMOTE_ARCHIVE" "$REMOTE_API_IMAGE"
          }
          trap cleanup_uploads EXIT
          trap 'status=$?; failed_line=$LINENO; failed_command=$BASH_COMMAND; if [ "${API_DEPLOY_ROLLBACK_ARMED:-0}" -eq 1 ] && declare -F rollback_api >/dev/null; then rollback_api || true; fi; echo "remote deploy failed at line ${failed_line}: ${failed_command} (exit ${status})" >&2; exit "$status"' ERR
          STAGE="${DEPLOY_ROOT}/releases/.stage-${GITHUB_SHA}"
          RELEASE="${DEPLOY_ROOT}/releases/${GITHUB_SHA}"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/web"
          tar -xzf "$REMOTE_ARCHIVE" -C "$STAGE/web"
          test -f "$STAGE/web/index.html"
          test -f "$STAGE/web/build-manifest.json"
          test ! -e "$STAGE/web/data"
          chmod -R a+rX "$STAGE"

          # The web and API are one release. Load the API image first and only
          # expose the new web after the matching API has passed migrations and
          # readiness checks.
          docker load --input "$REMOTE_API_IMAGE"
          mapfile -t API_CONTAINERS < <(docker ps --filter 'label=com.docker.compose.service=shoditsa-api' -q)
          if [ "${#API_CONTAINERS[@]}" -ne 1 ]; then
            echo "Expected exactly one running Shoditsa API container, found ${#API_CONTAINERS[@]}" >&2
            exit 1
          fi
          API_CONTAINER="${API_CONTAINERS[0]}"
          PREVIOUS_API_IMAGE="$(docker inspect --format '{{.Config.Image}}' "$API_CONTAINER")"
          API_COMPOSE_FILES="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project.config_files"}}' "$API_CONTAINER")"
          API_COMPOSE_DIR="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project.working_dir"}}' "$API_CONTAINER")"
          API_COMPOSE_PROJECT="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$API_CONTAINER")"
          API_COMPOSE_SERVICE="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.service"}}' "$API_CONTAINER")"
          if [ -z "$API_COMPOSE_FILES" ] || [[ "$API_COMPOSE_FILES" == *,* ]] || [ ! -f "$API_COMPOSE_FILES" ] || [ -z "$API_COMPOSE_DIR" ] || [ -z "$API_COMPOSE_PROJECT" ] || [ -z "$API_COMPOSE_SERVICE" ]; then
            echo "Shoditsa API is missing a supported single-file Compose configuration" >&2
            exit 1
          fi
          # API, worker and one-shot migrate must move as one release. The
          # worker was added after this guard was introduced, so accepting two
          # declarations would silently leave background jobs on the old code.
          API_IMAGE_LINES="$(grep -Ec '^[[:space:]]*image:[[:space:]]+shoditsa-api:[^[:space:]]+' "$API_COMPOSE_FILES" || true)"
          if [ "$API_IMAGE_LINES" -ne 3 ]; then
            echo "Expected exactly three Shoditsa API image declarations (API, worker, migrate), found ${API_IMAGE_LINES}" >&2
            exit 1
          fi
          api_compose() {
            docker compose --project-directory "$API_COMPOSE_DIR" --project-name "$API_COMPOSE_PROJECT" -f "$API_COMPOSE_FILES" "$@"
          }
          refresh_docker_nginx() {
            mapfile -t API_PROXY_CONTAINERS < <(
              while IFS= read -r container; do
                mount_source="$(docker inspect --format '{{range .Mounts}}{{if eq .Destination "/var/www/shoditsa"}}{{.Source}}{{end}}{{end}}' "$container")"
                [ -n "$mount_source" ] && printf '%s\n' "$container"
              done < <(docker ps -q)
            )
            # A host Nginx proxies through the stable published port and does
            # not need a restart. Docker Nginx resolves the API container IP
            # only at startup, so refresh it after every API recreation.
            [ "${#API_PROXY_CONTAINERS[@]}" -eq 0 ] && return 0
            if [ "${#API_PROXY_CONTAINERS[@]}" -ne 1 ]; then
              echo "Expected at most one Docker Nginx proxy, found ${#API_PROXY_CONTAINERS[@]}" >&2
              return 1
            fi
            docker restart "${API_PROXY_CONTAINERS[0]}" >/dev/null
            docker exec "${API_PROXY_CONTAINERS[0]}" nginx -t
          }
          mapfile -t API_WORKER_SERVICES < <(api_compose config --services | grep -E '(^|-)worker$' || true)
          if [ "${#API_WORKER_SERVICES[@]}" -ne 1 ]; then
            echo "Expected exactly one Shoditsa worker service, found ${#API_WORKER_SERVICES[@]}" >&2
            cp -a "$API_COMPOSE_BACKUP" "$API_COMPOSE_FILES"
            exit 1
          fi
          API_WORKER_SERVICE="${API_WORKER_SERVICES[0]}"
          API_COMPOSE_BACKUP="${API_COMPOSE_FILES}.pre-${GITHUB_SHA}"
          cp -a "$API_COMPOSE_FILES" "$API_COMPOSE_BACKUP"
          rollback_api() {
            API_DEPLOY_ROLLBACK_ARMED=0
            cp -a "$API_COMPOSE_BACKUP" "$API_COMPOSE_FILES"
            api_compose config --quiet
            api_compose up -d --no-deps --force-recreate "$API_COMPOSE_SERVICE" "$API_WORKER_SERVICE" || true
            refresh_docker_nginx || true
          }
          API_DEPLOY_ROLLBACK_ARMED=1
          sed -Ei "s#^([[:space:]]*image:[[:space:]]*)shoditsa-api:[^[:space:]]+#\1shoditsa-api:${GITHUB_SHA}#" "$API_COMPOSE_FILES"
          api_compose config --quiet
          MIGRATE_SERVICES="$(api_compose --profile migrate config --services)"
          API_SERVICES="$(api_compose config --services)"
          if ! grep -Fx 'shoditsa-migrate' <<<"$MIGRATE_SERVICES" >/dev/null; then
            echo "Shoditsa migrate service is missing from Compose" >&2
            exit 1
          fi
          if ! grep -Fx 'shoditsa-postgres' <<<"$API_SERVICES" >/dev/null; then
            echo "Shoditsa PostgreSQL service is missing from Compose" >&2
            exit 1
          fi

          POSTGRES_CONTAINER="$(api_compose ps -q shoditsa-postgres)"
          if [ -z "$POSTGRES_CONTAINER" ]; then
            echo "Shoditsa PostgreSQL container is not running" >&2
            rollback_api
            exit 1
          fi
          mkdir -p "${DEPLOY_ROOT}/backups"
          DATABASE_BACKUP="${DEPLOY_ROOT}/backups/pre-deploy-${GITHUB_SHA}.dump"
          if ! docker exec "$POSTGRES_CONTAINER" pg_dump -U shoditsa_app -d shoditsa -Fc > "$DATABASE_BACKUP" || [ ! -s "$DATABASE_BACKUP" ]; then
            echo "Failed to create the pre-deploy PostgreSQL backup" >&2
            rollback_api
            exit 1
          fi
          chmod 600 "$DATABASE_BACKUP"

          # Complete the one-time admin bootstrap from the existing Better Auth
          # account. The exact email is a hard invariant; zero or duplicate
          # matches stop the deployment before the new API is exposed.
          mapfile -t API_ENV_FILES < <(grep -oE '/[^[:space:]]+\.env' "$API_COMPOSE_FILES" | sort -u)
          if [ "${#API_ENV_FILES[@]}" -ne 1 ] || [ ! -f "${API_ENV_FILES[0]}" ]; then
            echo "Expected exactly one Shoditsa API env file, found ${#API_ENV_FILES[@]}" >&2
            rollback_api
            exit 1
          fi
          API_ENV_FILE="${API_ENV_FILES[0]}"
          cp -an "$API_ENV_FILE" "${API_ENV_FILE}.pre-admin-bootstrap"
          mapfile -t ADMIN_USER_IDS < <(docker exec "$POSTGRES_CONTAINER" psql -U shoditsa_app -d shoditsa -At -c "select id from \"user\" where lower(trim(email)) = 'breneize@yandex.ru';")
          if [ "${#ADMIN_USER_IDS[@]}" -ne 1 ] || [[ ! "${ADMIN_USER_IDS[0]}" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$ ]]; then
            echo "Expected exactly one existing Better Auth user for the production admin" >&2
            rollback_api
            exit 1
          fi
          ADMIN_USER_ID="${ADMIN_USER_IDS[0]}"
          ADMIN_ROLE="$(docker exec "$POSTGRES_CONTAINER" psql -U shoditsa_app -d shoditsa -At -c "select role from player_profiles where user_id = '${ADMIN_USER_ID}' limit 1;" || true)"
          set_env_value() {
            local key="$1"
            local value="$2"
            if grep -qE "^${key}=" "$API_ENV_FILE"; then
              sed -Ei "s#^${key}=.*#${key}=${value}#" "$API_ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$value" >> "$API_ENV_FILE"
            fi
          }
          set_env_value ADMIN_EMAILS breneize@yandex.ru
          set_env_value ADMIN_USER_IDS "$ADMIN_USER_ID"
          chmod 600 "$API_ENV_FILE"

          if ! api_compose --profile migrate run --rm shoditsa-migrate </dev/null; then
            rollback_api
            exit 1
          fi
          if [ "$ADMIN_ROLE" != 'admin' ]; then
            if ! api_compose --profile migrate run --rm --no-deps --entrypoint node shoditsa-migrate apps/api/dist/admin-bootstrap.js --email=breneize@yandex.ru </dev/null; then
              rollback_api
              exit 1
            fi
          fi
          if ! api_compose --profile migrate run --rm --no-deps --entrypoint node shoditsa-migrate apps/api/dist/content-bootstrap-danetki.js </dev/null; then
            rollback_api
            exit 1
          fi
          if ! api_compose --profile migrate run --rm --no-deps --entrypoint node shoditsa-migrate apps/api/dist/content-import-dtf-comments.js --publish --report=/tmp/dtf-game-comments-25-import-report.json </dev/null; then
            rollback_api
            exit 1
          fi
          if ! api_compose up -d --no-deps --force-recreate "$API_COMPOSE_SERVICE" "$API_WORKER_SERVICE"; then
            rollback_api
            exit 1
          fi
          if ! refresh_docker_nginx; then
            rollback_api
            exit 1
          fi
          API_CONTAINER="$(api_compose ps -q "$API_COMPOSE_SERVICE")"
          API_WORKER_CONTAINER="$(api_compose ps -q "$API_WORKER_SERVICE")"
          if [ -z "$API_WORKER_CONTAINER" ]; then
            echo "Shoditsa worker container was not created" >&2
            rollback_api
            exit 1
          fi
          API_WORKER_STATE="$(docker inspect --format '{{.State.Status}}' "$API_WORKER_CONTAINER")"
          API_WORKER_IMAGE="$(docker inspect --format '{{.Config.Image}}' "$API_WORKER_CONTAINER")"
          if [ "$API_WORKER_STATE" != 'running' ] || [ "$API_WORKER_IMAGE" != "shoditsa-api:${GITHUB_SHA}" ]; then
            echo "Shoditsa worker did not start on release ${GITHUB_SHA} (state: ${API_WORKER_STATE}, image: ${API_WORKER_IMAGE})" >&2
            docker logs --tail 100 "$API_WORKER_CONTAINER" >&2 || true
            rollback_api
            exit 1
          fi
          for attempt in {1..24}; do
            API_HEALTH="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$API_CONTAINER")"
            [ "$API_HEALTH" = 'healthy' ] && break
            sleep 5
          done
          if [ "$API_HEALTH" != 'healthy' ]; then
            echo "Shoditsa API did not become healthy (status: ${API_HEALTH})" >&2
            docker logs --tail 100 "$API_CONTAINER" >&2 || true
            rollback_api
            exit 1
          fi
          API_META="$(docker exec "$API_CONTAINER" wget -q -O - http://127.0.0.1:3001/api/v1/meta)"
          if ! grep -Fq "\"buildSha\":\"${GITHUB_SHA}\"" <<<"$API_META"; then
            echo "Shoditsa API does not report release ${GITHUB_SHA}" >&2
            rollback_api
            exit 1
          fi
          if ! grep -Fq '"yandex":true' <<<"$API_META"; then
            echo "Shoditsa API does not advertise Yandex OAuth" >&2
            rollback_api
            exit 1
          fi
          MEDIA_SOURCE_ROOT="/opt/repeto/deploy/shoditsa/data/libraries"
          MEDIA_TARGET_ROOT="${DEPLOY_ROOT}/shared/media"
          if [ ! -d "$MEDIA_SOURCE_ROOT" ] || [ ! -d "$MEDIA_TARGET_ROOT" ]; then
            echo "Content media source or target is missing: $MEDIA_SOURCE_ROOT -> $MEDIA_TARGET_ROOT" >&2
            rollback_api
            exit 1
          fi
          # Legacy catalog paths deliberately remain private. Rewrite their
          # references only after every source file has been copied to the
          # mounted media volume; database updates are one transaction.
          if ! api_compose run --rm --no-deps --volume "$MEDIA_SOURCE_ROOT:/source:ro" --volume "$MEDIA_TARGET_ROOT:/media" --entrypoint node "$API_COMPOSE_SERVICE" apps/api/dist/content-migrate-media.js --apply --local-only --source=/source --target=/media </dev/null; then
            echo "Local content media migration failed" >&2
            rollback_api
            exit 1
          fi
          API_DEPLOY_ROLLBACK_ARMED=0
          rm -f "$API_COMPOSE_BACKUP"

          # Releases are immutable. A retry of the same SHA reuses the already
          # validated release; activation itself is one atomic symlink rename.
          if [ -e "$RELEASE" ]; then
            rm -rf "$STAGE"
          else
            mv "$STAGE" "$RELEASE"
          fi
          ln -sfn "$RELEASE" "${DEPLOY_ROOT}/current.next"
          mv -Tf "${DEPLOY_ROOT}/current.next" "${DEPLOY_ROOT}/current"

          # The previous deployment layout served this directory directly. The
          # VPS can run Nginx either on the host or as a Docker Compose service.
          # Keep the installed TLS/vhost configuration and only change the
          # filesystem source behind its existing /var/www/shoditsa root.
          LEGACY_ROOT="/opt/repeto/deploy/shoditsa"
          CURRENT_ROOT="${DEPLOY_ROOT}/current/web"
          if command -v nginx >/dev/null 2>&1; then
            LEGACY_ROOT_ESC="${LEGACY_ROOT//\//\\/}"
            CURRENT_ROOT_ESC="${CURRENT_ROOT//\//\\/}"
            mapfile -t NGINX_CONFIGS < <(grep -RIlE --exclude='*.pre-shoditsa-release-root' "root[[:space:]]+(${CURRENT_ROOT_ESC}|${LEGACY_ROOT_ESC})/?;" /etc/nginx 2>/dev/null || true)
            if [ "${#NGINX_CONFIGS[@]}" -ne 1 ]; then
              echo "Expected exactly one host Nginx config for Shoditsa root (${LEGACY_ROOT} or ${CURRENT_ROOT}), found ${#NGINX_CONFIGS[@]}" >&2
              exit 1
            fi
            NGINX_CONFIG="${NGINX_CONFIGS[0]}"
            NGINX_BACKUP="${NGINX_CONFIG}.pre-shoditsa-release-root"
            cp -a "$NGINX_CONFIG" "$NGINX_BACKUP"
            HOST_NGINX_CHANGED=0
            if grep -Eq "root[[:space:]]+${LEGACY_ROOT_ESC}/?;" "$NGINX_CONFIG"; then
              sed -Ei "s#root[[:space:]]+${LEGACY_ROOT_ESC}/?;#root ${CURRENT_ROOT};#" "$NGINX_CONFIG"
              HOST_NGINX_CHANGED=1
            fi
            if ! grep -Eq 'client_max_body_size[[:space:]]+25m;' "$NGINX_CONFIG"; then
              if grep -Eq 'client_max_body_size[[:space:]]+[0-9]+[kKmM]?;' "$NGINX_CONFIG"; then
                sed -Ei 's/client_max_body_size[[:space:]]+[0-9]+[kKmM]?;/client_max_body_size 25m;/g' "$NGINX_CONFIG"
              else
                sed -Ei "/root[[:space:]]+${CURRENT_ROOT_ESC}\\/?;/a\\    client_max_body_size 25m;" "$NGINX_CONFIG"
              fi
              HOST_NGINX_CHANGED=1
            fi
            if [ "$HOST_NGINX_CHANGED" -eq 1 ]; then
              if ! nginx -t; then
                cp -a "$NGINX_BACKUP" "$NGINX_CONFIG"
                nginx -t
                exit 1
              fi
              systemctl reload nginx
            fi
          elif command -v docker >/dev/null 2>&1; then
            mapfile -t NGINX_CONTAINERS < <(
              while IFS= read -r container; do
                mount_source="$(docker inspect --format '{{range .Mounts}}{{if eq .Destination "/var/www/shoditsa"}}{{.Source}}{{end}}{{end}}' "$container")"
                [ -n "$mount_source" ] && printf '%s\n' "$container"
              done < <(docker ps -q)
            )
            if [ "${#NGINX_CONTAINERS[@]}" -ne 1 ]; then
              echo "Expected exactly one running container with /var/www/shoditsa, found ${#NGINX_CONTAINERS[@]}" >&2
              exit 1
            fi
            NGINX_CONTAINER="${NGINX_CONTAINERS[0]}"
            COMPOSE_FILES="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project.config_files"}}' "$NGINX_CONTAINER")"
            COMPOSE_DIR="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project.working_dir"}}' "$NGINX_CONTAINER")"
            COMPOSE_PROJECT="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$NGINX_CONTAINER")"
            COMPOSE_SERVICE="$(docker inspect --format '{{index .Config.Labels "com.docker.compose.service"}}' "$NGINX_CONTAINER")"
            if [ -z "$COMPOSE_FILES" ] || [[ "$COMPOSE_FILES" == *,* ]] || [ ! -f "$COMPOSE_FILES" ] || [ -z "$COMPOSE_DIR" ] || [ -z "$COMPOSE_PROJECT" ] || [ -z "$COMPOSE_SERVICE" ]; then
              echo "Docker Nginx is missing a supported single-file Compose configuration" >&2
              exit 1
            fi

            COMPOSE_BACKUP="${COMPOSE_FILES}.pre-shoditsa-release-root"
            COMPOSE_CHANGED=0
            if ! grep -Fq "${CURRENT_ROOT}:/var/www/shoditsa:ro" "$COMPOSE_FILES"; then
              LEGACY_MOUNTS="$(grep -Ec '^[[:space:]]*-[[:space:]]+[^:]+:/var/www/shoditsa:ro[[:space:]]*$' "$COMPOSE_FILES" || true)"
              if [ "$LEGACY_MOUNTS" -ne 1 ]; then
                echo "Expected exactly one Compose bind mount for /var/www/shoditsa, found ${LEGACY_MOUNTS}" >&2
                exit 1
              fi
              cp -a "$COMPOSE_FILES" "$COMPOSE_BACKUP"
              sed -Ei "s#^([[:space:]]*-[[:space:]]+)[^:]+:/var/www/shoditsa:ro[[:space:]]*\$#\1${CURRENT_ROOT}:/var/www/shoditsa:ro#" "$COMPOSE_FILES"
              grep -Fq "${CURRENT_ROOT}:/var/www/shoditsa:ro" "$COMPOSE_FILES"
              COMPOSE_CHANGED=1
            fi

            compose() {
              docker compose --project-directory "$COMPOSE_DIR" --project-name "$COMPOSE_PROJECT" -f "$COMPOSE_FILES" "$@"
            }
            rollback_compose() {
              if [ "$COMPOSE_CHANGED" -eq 1 ] && [ -f "$COMPOSE_BACKUP" ]; then
                cp -a "$COMPOSE_BACKUP" "$COMPOSE_FILES"
                compose config --quiet
                compose up -d --no-deps --force-recreate "$COMPOSE_SERVICE" || true
              fi
            }
            compose config --quiet
            if ! compose up -d --no-deps --force-recreate "$COMPOSE_SERVICE"; then
              rollback_compose
              exit 1
            fi
            NGINX_CONTAINER="$(compose ps -q "$COMPOSE_SERVICE")"
            if [ -z "$NGINX_CONTAINER" ] || ! docker exec "$NGINX_CONTAINER" nginx -t; then
              rollback_compose
              exit 1
            fi
            if ! docker exec "$NGINX_CONTAINER" grep -Fq "\"commitSha\": \"${GITHUB_SHA}\"" /var/www/shoditsa/build-manifest.json; then
              echo "Docker Nginx does not see release ${GITHUB_SHA}" >&2
              rollback_compose
              exit 1
            fi
          else
            echo "Neither host Nginx nor Docker is available to activate the web release" >&2
            exit 1
          fi

          test "$(readlink -f "$CURRENT_ROOT")" = "$(readlink -f "$RELEASE/web")"
          find "${DEPLOY_ROOT}/backups" -maxdepth 1 -type f -name 'pre-deploy-*.dump' -printf '%T@ %p\n' \
            | sort -nr \
            | tail -n +11 \
            | cut -d' ' -f2- \
            | while IFS= read -r backup; do rm -f -- "$backup"; done
          while IFS= read -r image; do
            if [ "$image" != "shoditsa-api:${GITHUB_SHA}" ] && [ "$image" != "$PREVIOUS_API_IMAGE" ]; then
              docker image rm "$image" >/dev/null 2>&1 || true
            fi
          done < <(docker images --format '{{.Repository}}:{{.Tag}}' shoditsa-api)
          REMOTE
      - name: External smoke
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PRODUCTION_URL: https://shoditsa.ru
        run: |
          npm run smoke:production
          curl -fsS https://shoditsa.ru/api/v1/meta >/dev/null
